name: Test

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - 'packages/**/*.py'
      - 'uv.lock'
  pull_request:
    paths:
      - 'packages/**/*.py'
      - 'uv.lock'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run pytest
        run: nix develop '.?dir=dev#ci' -c pytest
